<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign-In | J&amp;M Laundry Lounge</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary": "#705d00",
                        "surface-container-highest": "#e3e2e6",
                        "on-secondary-container": "#406b56",
                        "on-primary-container": "#708ab5",
                        "on-secondary-fixed": "#002113",
                        "inverse-primary": "#aec7f6",
                        "tertiary-container": "#c9a900",
                        "surface": "#faf9fd",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed": "#001b3d",
                        "on-primary-fixed-variant": "#2d476f",
                        "tertiary-fixed-dim": "#e9c400",
                        "error-container": "#ffdad6",
                        "on-surface": "#1a1b1e",
                        "surface-container": "#efedf1",
                        "primary-fixed": "#d6e3ff",
                        "surface-container-low": "#f4f3f7",
                        "secondary-fixed": "#bdedd2",
                        "tertiary-fixed": "#ffe16d",
                        "primary-container": "#002147",
                        "surface-bright": "#faf9fd",
                        "on-background": "#1a1b1e",
                        "background": "#faf9fd",
                        "error": "#ba1a1a",
                        "outline-variant": "#c4c6cf",
                        "surface-container-high": "#e9e7eb",
                        "primary-fixed-dim": "#aec7f6",
                        "on-tertiary-fixed": "#221b00",
                        "outline": "#74777f",
                        "surface-tint": "#465f88",
                        "on-surface-variant": "#44474e",
                        "on-error-container": "#93000a",
                        "on-tertiary-container": "#4c3f00",
                        "on-tertiary-fixed-variant": "#544600",
                        "surface-variant": "#e3e2e6",
                        "inverse-surface": "#2f3033",
                        "secondary-fixed-dim": "#a2d1b7",
                        "on-primary": "#ffffff",
                        "secondary-container": "#bbeacf",
                        "primary": "#000a1e",
                        "inverse-on-surface": "#f1f0f4",
                        "secondary": "#3b6751",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "surface-dim": "#dad9dd",
                        "on-secondary-fixed-variant": "#234f3b",
                        "surface-container-lowest": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #faf9fd;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .editorial-gradient {
            background: linear-gradient(135deg, #000a1e 0%, #002147 100%);
        }
    </style>
</head>
<body class="bg-surface min-h-screen flex flex-col items-center justify-center p-6 selection:bg-primary-fixed selection:text-on-primary-fixed">
<main class="w-full max-w-[480px] flex flex-col items-center">
<!-- Logo Section -->
<div class="mb-10 text-center">
<div class="inline-flex items-center justify-center w-16 h-16 bg-primary-container rounded-xl mb-4 shadow-sm">
<span class="material-symbols-outlined text-white text-3xl" data-icon="local_laundry_service">local_laundry_service</span>
</div>
<h1 class="text-2xl font-black text-primary tracking-[-0.02em]">J&amp;M Laundry</h1>
<p class="text-on-surface-variant font-medium tracking-tight mt-1">Management Suite</p>
</div>
<!-- Authentication Card -->
<div class="w-full bg-surface-container-lowest rounded-xl p-8 md:p-10 shadow-[0_40px_40px_rgba(0,10,30,0.04)] border-none">
<header class="mb-8">
<h2 class="text-xl font-bold text-on-surface tracking-tight">Staff Sign-In</h2>
<p class="text-on-surface-variant text-sm mt-1">Enter your credentials to access the portal.</p>
</header>
<form class="space-y-6" onsubmit="return false;">
<!-- Email Input Group -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-secondary" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-highest rounded-lg text-on-surface placeholder:text-outline border-none focus:ring-2 focus:ring-primary-fixed transition-all" id="email" placeholder="staff@jmlaundry.com" type="email"/>
</div>
</div>
<!-- Password Input Group -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-xs font-bold uppercase tracking-widest text-secondary" for="password">Password</label>
<a class="text-xs font-semibold text-tertiary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-highest rounded-lg text-on-surface placeholder:text-outline border-none focus:ring-2 focus:ring-primary-fixed transition-all" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full editorial-gradient text-on-primary font-bold py-4 rounded-full flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all shadow-md mt-4" type="submit">
<span>Log In</span>
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button><div class="mt-6 text-center text-sm font-medium text-on-surface-variant">
<span>Don't have an account?</span>
<a class="text-primary font-bold hover:underline ml-1 transition-all" href="#">Register</a>
</div>
</form>
</div>
<!-- Footer -->
<footer class="mt-12 text-center">
<div class="flex items-center justify-center gap-2 text-on-surface-variant text-sm font-medium">
<span class="w-1.5 h-1.5 rounded-full bg-secondary"></span>
<span class="tracking-tight">J&amp;M Laundry Lounge — Staff Portal</span>
</div>
<p class="text-[10px] text-outline mt-2 font-semibold uppercase tracking-widest">Authorized Access Only</p>
</footer>
</main>
<!-- Decorative Elements -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] right-[-5%] w-[40%] h-[40%] bg-primary-fixed opacity-20 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[30%] h-[30%] bg-secondary-fixed opacity-20 blur-[100px] rounded-full"></div>
</div>
</body></html>
