<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register - J&amp;M Laundry Lounge</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#221b00",
                        "surface-container-low": "#f4f3f7",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#f1f0f4",
                        "on-secondary-fixed": "#002113",
                        "secondary": "#3b6751",
                        "tertiary-fixed-dim": "#e9c400",
                        "on-surface-variant": "#44474e",
                        "surface-variant": "#e3e2e6",
                        "primary-fixed-dim": "#aec7f6",
                        "surface-bright": "#faf9fd",
                        "inverse-primary": "#aec7f6",
                        "surface-dim": "#dad9dd",
                        "outline": "#74777f",
                        "on-tertiary-container": "#4c3f00",
                        "on-tertiary-fixed-variant": "#544600",
                        "primary-container": "#002147",
                        "on-secondary-fixed-variant": "#234f3b",
                        "surface": "#faf9fd",
                        "secondary-fixed-dim": "#a2d1b7",
                        "outline-variant": "#c4c6cf",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#ffe16d",
                        "on-primary-fixed-variant": "#2d476f",
                        "tertiary": "#705d00",
                        "primary-fixed": "#d6e3ff",
                        "on-primary-fixed": "#001b3d",
                        "background": "#faf9fd",
                        "surface-container": "#efedf1",
                        "surface-tint": "#465f88",
                        "secondary-fixed": "#bdedd2",
                        "on-surface": "#1a1b1e",
                        "surface-container-high": "#e9e7eb",
                        "error-container": "#ffdad6",
                        "primary": "#000a1e",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#c9a900",
                        "on-error": "#ffffff",
                        "on-primary-container": "#708ab5",
                        "on-background": "#1a1b1e",
                        "on-secondary-container": "#406b56",
                        "on-error-container": "#93000a",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#2f3033",
                        "surface-container-highest": "#e3e2e6",
                        "secondary-container": "#bbeacf",
                        "surface-container-lowest": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-6 selection:bg-tertiary-fixed">
<div class="fixed inset-0 overflow-hidden -z-10">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-secondary/5 blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] rounded-full bg-tertiary/5 blur-[120px]"></div>
</div>
<div class="w-full max-w-[480px] bg-surface-container-lowest rounded-xl p-10 flex flex-col items-center gap-8 shadow-[0_40px_40px_rgba(0,10,30,0.04)] relative">
<div class="flex flex-col items-center gap-3">
<div class="w-16 h-16 rounded-full bg-primary-container flex items-center justify-center text-on-primary">
<span class="material-symbols-outlined text-3xl" data-icon="local_laundry_service">local_laundry_service</span>
</div>
<div class="text-center">
<h1 class="text-2xl font-black text-primary tracking-tight">J&amp;M Laundry</h1>
<p class="text-sm font-medium text-secondary uppercase tracking-widest mt-1">Management Suite</p>
</div>
</div>
<div class="w-full">
<div class="mb-8 text-center">
<h2 class="text-xl font-bold text-on-surface">Create your account</h2>
<p class="text-on-surface-variant text-sm mt-1">Join the lounge and manage your laundry flow</p>
</div>
<form class="flex flex-col gap-5">
<div class="flex flex-col gap-2">
<label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider ml-1">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="person">person</span>
<input class="w-full bg-surface-container-highest border-none rounded-lg py-4 pl-12 pr-4 focus:ring-2 focus:ring-primary-fixed transition-all text-on-surface placeholder:text-outline/50" placeholder="Juan Dela Cruz" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider ml-1">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="mail">mail</span>
<input class="w-full bg-surface-container-highest border-none rounded-lg py-4 pl-12 pr-4 focus:ring-2 focus:ring-primary-fixed transition-all text-on-surface placeholder:text-outline/50" placeholder="juan@laundrylounge.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider ml-1">Phone Number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="call">call</span>
<input class="w-full bg-surface-container-highest border-none rounded-lg py-4 pl-12 pr-4 focus:ring-2 focus:ring-primary-fixed transition-all text-on-surface placeholder:text-outline/50" placeholder="+63 900 000 0000" type="tel"/>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="flex flex-col gap-2">
<label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider ml-1">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-highest border-none rounded-lg py-4 pl-12 pr-4 focus:ring-2 focus:ring-primary-fixed transition-all text-on-surface placeholder:text-outline/50" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider ml-1">Confirm</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="verified_user">verified_user</span>
<input class="w-full bg-surface-container-highest border-none rounded-lg py-4 pl-12 pr-4 focus:ring-2 focus:ring-primary-fixed transition-all text-on-surface placeholder:text-outline/50" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<button class="w-full mt-4 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold py-4 px-6 rounded-full shadow-lg shadow-primary/10 active:scale-[0.98] transition-transform flex items-center justify-center gap-2" type="submit">
                    Register
                    <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="mt-8 pt-8 border-t border-surface-container-high text-center">
<p class="text-on-surface-variant text-sm">
                    Already have an account? 
                    <a class="text-tertiary font-bold hover:underline underline-offset-4 ml-1 transition-all" href="#">Back to Login</a>
</p>
</div>
</div>
<div class="absolute -right-4 -top-4 w-24 h-24 bg-tertiary-container/30 rounded-full blur-2xl pointer-events-none"></div>
<div class="absolute -left-4 -bottom-4 w-24 h-24 bg-secondary-container/20 rounded-full blur-2xl pointer-events-none"></div>
</div>
<div class="fixed bottom-8 text-center w-full px-6">
<p class="text-[10px] text-on-surface-variant font-bold uppercase tracking-[0.2em] opacity-50">
            Premium Operations Management System © 2024 J&amp;M Laundry Lounge
        </p>
</div>
</body></html>
